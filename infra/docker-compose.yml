version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: climate_postgis
    environment:
      POSTGRES_USER: climate_admin
      POSTGRES_PASSWORD: climate_password
      POSTGRES_DB: climate_engine
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgis_data: