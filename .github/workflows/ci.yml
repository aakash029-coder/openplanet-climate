name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save free CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — tests, science guard, HF sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint (critical errors only — syntax/undefined names)
        run: ruff check --select E9,F63,F7,F82 climate_engine scripts tests

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Pin scientific formulas (regression guard)
        run: pytest tests/test_science_formulas.py -v

      - name: Reproduce historical back-tests
        run: python -m climate_engine.validation.run_all

      - name: HF science-core sync guard
        run: python scripts/check_hf_sync.py

  frontend:
    name: Frontend — typecheck, lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Dummy values so next build / next-auth init never block CI.
          NEXTAUTH_SECRET: ci-build-placeholder-secret
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
